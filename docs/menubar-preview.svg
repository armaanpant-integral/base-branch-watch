<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="menuShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="480" height="480" fill="#f5f5f7"/>

  <!-- macOS menu bar strip -->
  <rect x="0" y="0" width="480" height="26" fill="#1c1c1e"/>
  <text x="450" y="17" font-size="12" fill="#ff453a" text-anchor="end" font-weight="600">&#128308; 2</text>

  <!-- Dropdown menu -->
  <g filter="url(#menuShadow)">
    <rect x="220" y="26" width="248" height="416" rx="9" fill="#282828" stroke="#000000" stroke-opacity="0.3"/>

    <!-- status rows -->
    <text x="234" y="48" font-size="12.5" fill="#f2f2f2">&#128994; payments-service</text>

    <text x="234" y="72" font-size="12.5" fill="#f2f2f2">&#128993; api-gateway: 3 behind (main)</text>

    <text x="234" y="96" font-size="12.5" fill="#f2f2f2">&#9888;&#65039; web-app: conflict risk</text>
    <text x="244" y="110" font-size="11" fill="#a0a0a5">2 file(s) overlap (main)</text>
    <text x="452" y="100" font-size="11" fill="#8e8e93">&#9656;</text>

    <text x="234" y="132" font-size="12.5" fill="#f2f2f2">&#128308; infra-tools: diverged</text>
    <text x="244" y="146" font-size="11" fill="#a0a0a5">5 behind, 2 ahead (main)</text>

    <line x1="228" y1="160" x2="460" y2="160" stroke="#444447" stroke-width="1"/>

    <!-- PR status rows -->
    <text x="234" y="180" font-size="12.5" fill="#f2f2f2">&#128256; payments-service: PR #42</text>
    <text x="244" y="194" font-size="10.5" fill="#a0a0a5">&#9989; 8/8 checks &#183; &#9989; approved &#183; &#9989; mergeable</text>
    <text x="452" y="184" font-size="11" fill="#8e8e93">&#9656;</text>

    <text x="234" y="216" font-size="12.5" fill="#f2f2f2">&#9898; api-gateway: no open PR</text>
    <text x="244" y="230" font-size="11" fill="#a0a0a5">(feature/rate-limit-fix)</text>

    <line x1="228" y1="244" x2="460" y2="244" stroke="#444447" stroke-width="1"/>

    <!-- menu actions -->
    <text x="234" y="264" font-size="12.5" fill="#f2f2f2">Add Repo&#8230;</text>
    <text x="234" y="288" font-size="12.5" fill="#f2f2f2">Edit Base Branch(es)</text>
    <text x="234" y="312" font-size="12.5" fill="#f2f2f2">Remove Repo</text>
    <text x="452" y="308" font-size="11" fill="#8e8e93">&#9656;</text>
    <text x="234" y="336" font-size="12.5" fill="#f2f2f2">Set Interval&#8230;</text>
    <text x="234" y="360" font-size="12.5" fill="#f2f2f2">Refresh Now</text>
    <text x="234" y="384" font-size="12.5" fill="#f2f2f2">Open Log</text>

    <line x1="228" y1="398" x2="460" y2="398" stroke="#444447" stroke-width="1"/>

    <text x="234" y="418" font-size="12.5" fill="#f2f2f2">Quit</text>
  </g>

  <text x="12" y="465" font-size="11" fill="#8e8e93">Illustrative preview - example data, not a live screenshot</text>
</svg>
